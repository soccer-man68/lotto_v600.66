<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOTTO NEURO-DNA HYBRID v600 / v610 PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --panel-dark: #0f172a;
            --header-dark: #1e1b4b;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --text-slate: #94a3b8;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            height: 100%; overflow-x: hidden;
        }

        /* 비밀번호 화면 */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: var(--panel-dark); padding: 40px; border-radius: 15px;
            border: 1px solid var(--header-dark); text-align: center; width: 80%; max-width: 350px;
        }
        input[type="password"], input[type="text"] {
            padding: 12px; border-radius: 5px; border: none; width: 80%;
            font-size: 18px; text-align: center; margin-bottom: 20px;
            background: #1e293b; color: white;
        }
        .btn-login {
            background: var(--accent-blue); color: var(--bg-dark);
            border: none; padding: 12px 30px; border-radius: 5px;
            font-weight: bold; cursor: pointer; width: 100%;
        }

        /* 메인 UI */
        #main-app { display: none; min-height: 100vh; flex-direction: column; }
        
        .tab-container { display: flex; background: var(--header-dark); padding: 0 5px; position: sticky; top:0; z-index: 100; }
        .tab-btn {
            flex: 1; padding: 15px 10px; cursor: pointer; border: none; background: none;
            color: var(--text-slate); font-weight: bold; font-size: 14px;
        }
        .tab-btn.active {
            background: var(--accent-blue); color: var(--bg-dark);
        }

        .content-area { flex: 1; padding: 15px; display: none; }
        .content-area.active { display: block; }

        header {
            background: var(--header-dark); padding: 15px; text-align: center;
            border-bottom: 2px solid var(--panel-dark); margin-bottom: 15px;
        }
        h1 { color: var(--accent-blue); font-size: 20px; margin: 0; font-family: 'Arial Black'; }

        .control-row {
            display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
            background: var(--panel-dark); padding: 12px; border-radius: 8px;
            border: 1px solid #334155; flex-wrap: wrap;
        }

        .status-bar {
            color: var(--accent-red); font-weight: bold; margin-bottom: 10px; font-size: 15px;
        }

        .display-split { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
        @media(min-width: 768px) { .display-split { flex-direction: row; } }

        .sets-box {
            flex: 1; background: var(--bg-dark); padding: 15px;
            font-family: 'Consolas', monospace; font-size: 20px; color: var(--text-slate);
            border-radius: 8px; line-height: 1.8; border: 1px solid #1e293b;
        }
        .rank-panel {
            width: auto; background: var(--panel-dark); border: 3px solid var(--accent-blue);
            border-radius: 10px; padding: 20px; text-align: center;
        }

        .log-area {
            height: 150px; background: var(--panel-dark); color: var(--text-slate);
            font-family: 'Consolas', monospace; font-size: 12px; padding: 10px;
            overflow-y: auto; border: 1px solid #334155; border-radius: 5px;
        }
        .debug-console {
            height: 100px; background: #000; color: #34d399; font-family: 'Consolas', monospace;
            padding: 10px; overflow-y: auto; margin-top: 10px; border-radius: 5px; font-size: 11px;
        }

        button {
            padding: 10px 12px; border-radius: 4px; border: none; cursor: pointer;
            font-weight: bold; color: white; transition: 0.2s; font-size: 13px;
        }
        .btn-load { background: #334155; }
        .btn-evolve { background: #059669; }
        .btn-extract { background: #4338ca; }
        .btn-auto { background: #7c3aed; }
        .btn-stop { background: #dc2626; }

        .match-highlight { color: var(--accent-red); font-weight: bold; border-bottom: 2px solid var(--accent-red); }
        .hit-red { color: var(--accent-red); font-weight: bold; }
        
        select { background: #1e293b; color: white; border: 1px solid #475569; padding: 8px; border-radius: 4px; }

        /* 파일 인풋 숨김 (하지만 접근 가능하게) */
        .hidden-file { position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--accent-blue); margin-bottom: 20px;">SYSTEM ACCESS</h2>
        <input type="password" id="pass-input" placeholder="비밀번호 입력" inputmode="numeric">
        <br>
        <button class="btn-login" onclick="checkPassword()">접속 승인</button>
    </div>
</div>

<div id="main-app">
    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab(0)">v600.66 Turbo</button>
        <button class="tab-btn" onclick="switchTab(1)">v610.00 DNA PRO</button>
    </div>

    <!-- v600.66 Tab -->
    <div id="tab-v600" class="content-area active">
        <header><h1>NEURO-EVOLUTION v600.66</h1></header>
        <div class="control-row">
            <button class="btn-load" onclick="document.getElementById('file-excel').click()">📁 데이터 로드 (.xlsx)</button>
            <span id="v600-count-lbl">데이터 없음</span>
            <div style="width:100%; height:1px;"></div>
            <button class="btn-load" onclick="triggerLogicInput('v600')">📥 로직 로드 (.json)</button>
        </div>

        <div class="control-row">
            <label>목표:</label>
            <select id="v600-target-score">
                <script>
                    for(let i=30; i<=55; i++) {
                        let val = (i/10).toFixed(1);
                        document.write(`<option value="${val}" ${val=="4.0"?"selected":""}>${val}</option>`);
                    }
                </script>
            </select>
            <button id="v600-evolve-btn" class="btn-evolve" onclick="v600ToggleEvolution()">⚡ 진화</button>
            <button class="btn-extract" onclick="v600RunFixed()">🎯 추출</button>
            <button id="v600-auto-btn" class="btn-auto" onclick="v600ToggleAuto()">🔄 자동</button>
        </div>

        <div id="v600-status" class="status-bar">로직을 로드하거나 진화를 시작하세요.</div>

        <div class="display-split">
            <div id="v600-sets-display" class="sets-box">번호가 여기에 표시됩니다.</div>
            <div id="v600-rank-panel" class="rank-panel" style="display:none;">
                <div id="v600-rank-text" style="font-size: 18px; font-weight:bold; color:var(--accent-blue)">분석 중</div>
                <div id="v600-timer-text" style="color:var(--accent-green); margin-top:10px;"></div>
            </div>
        </div>

        <div id="v600-bt-log" class="log-area"></div>
        <div id="v600-debug-log" class="debug-console"></div>
    </div>

    <!-- v610.00 Tab -->
    <div id="tab-v610" class="content-area">
        <header><h1>DNA-EVOLUTION v610.00 PRO</h1></header>
        <div class="control-row">
            <button class="btn-load" onclick="document.getElementById('file-excel').click()">📁 데이터 로드</button>
            <span id="v610-count-lbl">데이터 없음</span>
            <div style="width:100%; height:1px;"></div>
            <button class="btn-load" onclick="triggerLogicInput('v610')">📥 DNA 로직 로드</button>
        </div>

        <div class="control-row">
            <button id="v610-opt-btn" class="btn-stop" style="background:#e11d48; width:100%;" onclick="v610ToggleSearch()">💎 최적 조합 탐색 시작</button>
        </div>

        <div id="v610-status" class="status-bar">로직 미장착</div>

        <div class="display-split">
            <div id="v610-sets-display" class="sets-box">번호 표시 대기</div>
            <div id="v610-rank-panel" class="rank-panel">
                <div id="v610-rank-text" style="font-size: 18px; font-weight:bold; color:var(--accent-blue)">대기 중</div>
            </div>
        </div>

        <div id="v610-bt-log" class="log-area"></div>
        <div id="v610-debug-log" class="debug-console"></div>
    </div>
</div>

<!-- 모바일 호환성을 극대화한 파일 인풋 -->
<input type="file" id="file-excel" class="hidden-file" 
       accept=".xlsx, .xls, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
<input type="file" id="file-logic" class="hidden-file" 
       accept=".json, application/json, text/plain">

<script>
    let sharedData = []; 
    let v600BestParams = null;
    let v600BestScore = 0.0;
    let v600IsEvolving = false;
    let v600IsAuto = false;
    let v600IsWaiting = false;
    let v610BestParams = null;
    let v610IsSearching = false;
    let logicTargetTab = 'v600';

    function checkPassword() {
        if(document.getElementById('pass-input').value === "4938") {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        } else { alert("비밀번호가 틀렸습니다."); }
    }

    function switchTab(idx) {
        const btns = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.content-area');
        btns.forEach((b, i) => b.classList.toggle('active', i === idx));
        contents.forEach((c, i) => c.classList.toggle('active', i === idx));
    }

    // 파일 로드 이벤트 리스너 등록 (안정성 강화)
    document.getElementById('file-excel').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
            sharedData = json.filter(row => row[0] && !isNaN(row[0]) && row[1] && !isNaN(row[1]));
            const msg = `${sharedData.length}회차 로드됨`;
            document.getElementById('v600-count-lbl').innerText = msg;
            document.getElementById('v610-count-lbl').innerText = msg;
            writeLog('v600', `>> 데이터 로드 성공 (${sharedData.length}건)\n`);
        };
        reader.readAsArrayBuffer(file);
    });

    function triggerLogicInput(target) {
        logicTargetTab = target;
        document.getElementById('file-logic').click();
    }

    document.getElementById('file-logic').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                if(logicTargetTab === 'v600') {
                    v600BestParams = json;
                    v600BestScore = json.score || 0.0;
                    document.getElementById('v600-status').innerText = `장착 로직: ${v600BestScore.toFixed(2)}점 ✅`;
                    document.getElementById('v600-status').style.color = "#10b981";
                } else {
                    v610BestParams = json;
                    document.getElementById('v610-status').innerText = `DNA 로직 장착 완료 ✅`;
                    document.getElementById('v610-status').style.color = "#10b981";
                }
                writeLog(logicTargetTab, `>> 로직 로드 성공: ${file.name}\n`);
            } catch(err) { alert("올바른 로직(JSON) 파일이 아닙니다."); }
        };
        reader.readAsText(file);
    });

    // --- 엔진 및 알고리즘 (이전 코드와 동일하되 모바일 최적화 유지) ---
    
    function weightedSample(weights) {
        let r = Math.random();
        let sum = 0;
        for(let i=0; i<weights.length; i++) {
            sum += weights[i];
            if(r <= sum) return i;
        }
        return 45;
    }

    function advancedPatternFilterV600(nums) {
        nums.sort((a,b) => a-b);
        const sum = nums.reduce((a,b) => a+b, 0);
        if(sum < 85 || sum > 205) return false;
        const odd = nums.filter(n => n % 2 !== 0).length;
        if(odd === 0 || odd === 6) return false;
        let diffs = new Set();
        for(let i=0; i<6; i++) for(let j=i+1; j<6; j++) diffs.add(nums[j] - nums[i]);
        if(diffs.size - 5 < 7) return false;
        for(let i=0; i<4; i++) if(nums[i]+1 === nums[i+1] && nums[i+1]+1 === nums[i+2]) return false;
        return true;
    }

    function dnaPatternFilterV610(nums) {
        nums.sort((a,b) => a-b);
        const sum = nums.reduce((a,b) => a+b, 0);
        if(sum < 110 || sum > 185) return false;
        const odd = nums.filter(n => n % 2 !== 0).length;
        if(![2,3,4].includes(odd)) return false;
        let diffs = new Set();
        for(let i=0; i<6; i++) for(let j=i+1; j<6; j++) diffs.add(nums[j] - nums[i]);
        if(diffs.size - 5 < 8) return false;
        const zones = nums.map(n => Math.floor(n/10));
        const counts = {}; zones.forEach(z => counts[z] = (counts[z]||0)+1);
        if(Object.values(counts).some(c => c >= 4)) return false;
        return true;
    }

    class NeuroEngineV600 {
        constructor(data, params) {
            this.data = data; this.params = params;
            this.weights = this.calcWeights();
            this.coreSize = parseInt(params.core_size || 14);
            let indexed = this.weights.map((w, i) => [w, i]).slice(1);
            indexed.sort((a, b) => b[0] - a[0]);
            this.superCore = indexed.slice(0, this.coreSize).map(x => x[1]);
        }
        calcWeights() {
            let w = new Array(46).fill(1.0);
            try {
                const recent = this.data.slice(-12);
                recent.forEach(row => { for(let i=1; i<=6; i++) { let n = parseInt(row[i]); if(n>=1 && n<=45) w[n] += (this.params.w_recent || 10); } });
                let lastIndices = {};
                for(let i=0; i<this.data.length; i++) {
                    const idx = this.data.length - 1 - i;
                    for(let j=1; j<=6; j++) { let n = parseInt(this.data[idx][j]); if(n>=1 && n<=45 && lastIndices[n] === undefined) lastIndices[n] = i; }
                }
                for(let n=1; n<=45; n++) {
                    let gap = lastIndices[n] !== undefined ? lastIndices[n] : 100;
                    if(gap >= 6 && gap <= 15) w[n] += (this.params.w_gap || 10);
                }
                const last = this.data[this.data.length-1];
                for(let i=1; i<=6; i++) { let n = parseInt(last[i]); if(n-1 >= 1) w[n-1] += (this.params.w_neighbor || 10); if(n+1 <= 45) w[n+1] += (this.params.w_neighbor || 10); }
            } catch(e) {}
            w[0] = 0;
            const maxW = Math.max(...w);
            let expW = w.map(v => Math.exp((v / (maxW + 1e-9)) * 3.0));
            const sumW = expW.reduce((a,b) => a+b, 0);
            return expW.map(v => v / sumW);
        }
        generateSets(count=6) {
            let results = [];
            for(let c=0; c<count; c++) {
                let valid = null;
                for(let attempt=0; attempt<600; attempt++) {
                    let pickN = Math.min(this.superCore.length, 3 + Math.floor(Math.random()*2));
                    let combo = new Set();
                    let shuffledCore = [...this.superCore].sort(() => 0.5 - Math.random());
                    shuffledCore.slice(0, pickN).forEach(v => combo.add(v));
                    while(combo.size < 6) combo.add(weightedSample(this.weights));
                    let candidate = Array.from(combo).sort((a,b) => a-b);
                    if(advancedPatternFilterV600(candidate)) { valid = candidate; break; }
                    if(attempt === 599) valid = candidate;
                }
                results.push(valid);
            }
            return results;
        }
    }

    class DNAEngineV605 {
        constructor(data, params) {
            this.data = data; this.params = params;
            this.weights = this.calcWeights();
            let indexed = this.weights.map((w, i) => [w, i]).slice(1);
            indexed.sort((a,b) => b[0] - a[0]);
            this.dnaCore = indexed.slice(0, 10).map(x => x[1]);
            this.linkPool = indexed.slice(10, 20).map(x => x[1]);
        }
        calcWeights() {
            let w = new Array(46).fill(1.0);
            const recent = this.data.slice(-12);
            recent.forEach(row => { for(let i=1; i<=6; i++) { let n = parseInt(row[i]); if(n>=1 && n<=45) w[n] += (this.params.w_recent || 10); } });
            w[0] = 0; const maxW = Math.max(...w);
            let powW = w.map(v => Math.pow(v / (maxW + 1e-9), 15.0));
            const sumW = powW.reduce((a,b) => a+b, 0);
            return powW.map(v => v / sumW);
        }
        generateDnaSets(count=6) {
            let results = [];
            for(let c=0; c<count; c++) {
                let valid = null;
                for(let att=0; att<5000; att++) {
                    let c1cnt = 4 + Math.floor(Math.random()*2);
                    let c1 = [...this.dnaCore].sort(() => 0.5 - Math.random()).slice(0, c1cnt);
                    let c2 = [...this.linkPool].sort(() => 0.5 - Math.random()).slice(0, 6-c1cnt);
                    let combo = [...c1, ...c2].sort((a,b) => a-b);
                    if(dnaPatternFilterV610(combo)) { valid = combo; break; }
                    if(att === 4999) valid = combo;
                }
                results.push(valid);
            }
            return results;
        }
    }

    // UI 및 공통 기능
    function writeLog(tab, msg) {
        const el = document.getElementById(`${tab}-debug-log`);
        el.innerText += msg; el.scrollTop = el.scrollHeight;
    }

    function updateSetsUI(tab, sets) {
        const el = document.getElementById(`${tab}-sets-display`);
        const lastRow = sharedData[sharedData.length-1];
        const lastActual = new Set(lastRow ? lastRow.slice(1, 7).map(n => parseInt(n)) : []);
        el.innerHTML = "";
        sets.forEach((set, i) => {
            let line = `SET ${i+1}: `;
            set.forEach(num => {
                const isMatch = lastActual.has(num);
                line += `<span class="${isMatch?'match-highlight':''}">${String(num).padStart(2, '0')}</span> `;
            });
            el.innerHTML += line + "<br>";
        });
    }

    function backtest(tab, sets) {
        if(sharedData.length < 10) return [];
        const logEl = document.getElementById(`${tab}-bt-log`);
        logEl.innerHTML = "최근 적중 분석:<br>";
        let history = [];
        for(let i=0; i<5; i++) {
            const row = sharedData[sharedData.length - 1 - i];
            const actual = new Set(row.slice(1, 7).map(n => parseInt(n)));
            let hits = sets.map(s => s.filter(n => actual.has(n)).length);
            let maxH = Math.max(...hits);
            history.push(maxH);
            logEl.innerHTML += `${row[0]}회: MAX [${maxH}] ( ${hits.join(', ')} )<br>`;
        }
        return history;
    }

    function v600CalcScore(params) {
        if(sharedData.length < 15) return 0;
        const eng1 = new NeuroEngineV600(sharedData.slice(0,-5), params);
        const h1 = [0,1,2,3,4].map(i => Math.max(...eng1.generateSets(6).map(s => s.filter(n => new Set(sharedData[sharedData.length-5+i].slice(1,7)).has(n)).length)));
        const avg1 = h1.reduce((a,b)=>a+b,0)/5;
        return avg1 + (h1.filter(h=>h>=3).length * 0.2);
    }

    async function v600ToggleEvolution() {
        if(v600IsEvolving) { v600IsEvolving = false; document.getElementById('v600-evolve-btn').innerText = "⚡ 진화"; }
        else {
            if(!sharedData.length) return alert("데이터 로드 필요");
            v600IsEvolving = true;
            document.getElementById('v600-evolve-btn').innerText = "🛑 중단";
            v600EvolutionLoop();
        }
    }

    async function v600EvolutionLoop() {
        const target = parseFloat(document.getElementById('v600-target-score').value);
        let bestP = v600BestParams || {w_recent: 25, w_gap: 20, w_neighbor: 15, core_size: 14};
        while(v600IsEvolving) {
            let currP = {...bestP};
            ['w_recent', 'w_gap', 'w_neighbor'].forEach(k => currP[k] = Math.max(1, currP[k] + (Math.random()*2-1)));
            let score = v600CalcScore(currP);
            if(score > v600BestScore) {
                v600BestScore = score; v600BestParams = {...currP, score: score};
                document.getElementById('v600-status').innerText = `최고 점수: ${score.toFixed(2)}`;
                updateSetsUI('v600', new NeuroEngineV600(sharedData, v600BestParams).generateSets(6));
            }
            if(v600BestScore >= target) { alert("목표 달성! 로직을 저장하세요."); v600IsEvolving = false; }
            await new Promise(r => setTimeout(r, 1));
        }
    }

    function v600RunFixed() {
        if(!v600BestParams) return;
        const sets = new NeuroEngineV600(sharedData, v600BestParams).generateSets(6);
        updateSetsUI('v600', sets); backtest('v600', sets);
    }

    function v600ToggleAuto() {
        v600IsAuto = !v600IsAuto;
        document.getElementById('v600-auto-btn').innerText = v600IsAuto ? "🛑 중지" : "🔄 자동";
        if(v600IsAuto) v600AutoLoop();
    }

    async function v600AutoLoop() {
        while(v600IsAuto) {
            const sets = new NeuroEngineV600(sharedData, v600BestParams).generateSets(6);
            const hist = backtest('v600', sets);
            const avg = hist.reduce((a,b)=>a+b,0)/5;
            if(avg >= 3.0) {
                document.getElementById('v600-rank-panel').style.display = "block";
                document.getElementById('v600-rank-text').innerText = `추천 조합 발견 (평균 ${avg.toFixed(1)})`;
                updateSetsUI('v600', sets);
                await new Promise(r => setTimeout(r, 5000));
            }
            await new Promise(r => setTimeout(r, 100));
        }
    }

    async function v610ToggleSearch() {
        if(v610IsSearching) { v610IsSearching = false; }
        else {
            if(!v610BestParams) return alert("로직 로드 필요");
            v610IsSearching = true;
            document.getElementById('v610-opt-btn').innerText = "🛑 탐색 중지";
            while(v610IsSearching) {
                const sets = new DNAEngineV605(sharedData, v610BestParams).generateDnaSets(6);
                const hist = backtest('v610', sets);
                const avg = hist.reduce((a,b)=>a+b,0)/5;
                document.getElementById('v610-rank-text').innerText = `탐색 중... 평균: ${avg.toFixed(2)}`;
                updateSetsUI('v610', sets);
                if(avg >= 3.10) { alert("최적 조합 발견!"); v610IsSearching = false; break; }
                await new Promise(r => setTimeout(r, 50));
            }
            document.getElementById('v610-opt-btn').innerText = "💎 최적 조합 탐색 시작";
        }
    }
</script>
