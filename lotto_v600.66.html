<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOTTO NEURO-DNA HYBRID PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --panel-dark: #0f172a;
            --header-dark: #1e1b4b;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --text-slate: #94a3b8;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            height: 100%; overflow-x: hidden;
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: var(--panel-dark); padding: 30px; border-radius: 15px;
            border: 1px solid var(--header-dark); text-align: center; width: 80%; max-width: 300px;
        }
        input[type="password"] {
            padding: 12px; border-radius: 5px; border: none; width: 90%;
            font-size: 18px; text-align: center; margin-bottom: 20px; background: #1e293b; color: white;
        }
        .btn-login {
            background: var(--accent-blue); color: var(--bg-dark);
            border: none; padding: 12px 30px; border-radius: 5px;
            font-weight: bold; cursor: pointer; width: 100%;
        }

        #main-app { display: none; flex-direction: column; min-height: 100vh; }
        
        .tab-container { display: flex; background: var(--header-dark); position: sticky; top: 0; z-index: 100; }
        .tab-btn {
            flex: 1; padding: 15px 5px; cursor: pointer; border: none; background: none;
            color: var(--text-slate); font-weight: bold; font-size: 14px;
        }
        .tab-btn.active {
            background: var(--accent-blue); color: var(--bg-dark);
        }

        .content-area { flex: 1; padding: 15px; display: none; }
        .content-area.active { display: block; }

        header {
            background: var(--header-dark); padding: 15px; text-align: center;
            border-bottom: 2px solid var(--panel-dark); margin-bottom: 15px; border-radius: 8px;
        }
        h1 { color: var(--accent-blue); font-size: 20px; margin: 0; font-family: 'Arial Black'; }

        .control-row {
            display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px;
            background: var(--panel-dark); padding: 12px; border-radius: 8px;
            border: 1px solid #334155;
        }

        .status-bar {
            color: var(--accent-red); font-weight: bold; margin: 10px 0; font-size: 14px; min-height: 20px;
        }

        .sets-box {
            background: #000; padding: 15px;
            font-family: 'Consolas', monospace; font-size: 18px; color: var(--text-slate);
            border-radius: 8px; line-height: 1.8; border: 1px solid #1e293b; margin-bottom: 15px;
        }

        .log-area {
            height: 150px; background: var(--panel-dark); color: var(--text-slate);
            font-family: 'Consolas', monospace; font-size: 12px; padding: 10px;
            overflow-y: auto; border: 1px solid #334155; border-radius: 5px; white-space: pre; margin-bottom: 15px;
        }
        .debug-console {
            height: 100px; background: #000; color: #34d399; font-family: 'Consolas', monospace;
            padding: 10px; overflow-y: auto; border-radius: 5px; font-size: 11px;
        }

        button {
            padding: 10px 12px; border-radius: 5px; border: none; cursor: pointer;
            font-weight: bold; color: white; font-size: 13px;
        }
        .btn-load { background: #475569; }
        .btn-evolve { background: #059669; }
        .btn-extract { background: #4338ca; }
        .btn-auto { background: #7c3aed; }
        .btn-stop { background: #e11d48; }

        .match-highlight { color: #facc15; font-weight: bold; text-decoration: underline; }
        .hit-red { color: var(--accent-red); font-weight: bold; }
        
        select { background: #1e293b; color: white; border: 1px solid #475569; padding: 8px; border-radius: 5px; }

        /* 파일 입력 필드 숨김 */
        .hidden-input {
            position: absolute; width: 1px; height: 1px; opacity: 0;
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--accent-blue); margin-bottom: 20px;">SYSTEM ACCESS</h2>
        <input type="password" id="pass-input" placeholder="비밀번호 4938" inputmode="numeric">
        <button class="btn-login" onclick="checkPassword()">접속하기</button>
    </div>
</div>

<div id="main-app">
    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab(0)">v600.66 Turbo</button>
        <button class="tab-btn" onclick="switchTab(1)">v610.00 DNA</button>
    </div>

    <!-- v600.66 Tab -->
    <div id="tab-v600" class="content-area active">
        <header><h1>NEURO-EVOLUTION v600.66</h1></header>
        <div class="control-row">
            <button class="btn-load" onclick="document.getElementById('file-excel').click()">📁 데이터 로드</button>
            <span id="v600-count-lbl">상태: 데이터 없음</span>
            <button class="btn-load" onclick="triggerLogicInput('v600')">📥 로직 로드</button>
        </div>
        <div class="control-row">
            <label>목표:</label>
            <select id="v600-target-score">
                <option value="3.5">3.5</option>
                <option value="4.0" selected>4.0</option>
                <option value="4.5">4.5</option>
            </select>
            <button id="v600-evolve-btn" class="btn-evolve" onclick="v600ToggleEvolution()">⚡ 진화</button>
            <button class="btn-extract" onclick="v600RunFixed()">🎯 추출</button>
            <button id="v600-auto-btn" class="btn-auto" onclick="v600ToggleAuto()">🔄 자동</button>
        </div>
        <div id="v600-status" class="status-bar">로직 파일을 선택하세요.</div>
        <div id="v600-sets-display" class="sets-box">전용 엔진 대기 중...</div>
        <div id="v600-bt-log" class="log-area">적중 분석 로그 대기...</div>
        <div id="v600-debug-log" class="debug-console">시스템 로그...</div>
    </div>

    <!-- v610.00 Tab -->
    <div id="tab-v610" class="content-area">
        <header><h1>DNA-EVOLUTION v610.00</h1></header>
        <div class="control-row">
            <button class="btn-load" onclick="document.getElementById('file-excel').click()">📁 데이터 로드</button>
            <span id="v610-count-lbl">상태: 데이터 없음</span>
            <button class="btn-load" onclick="triggerLogicInput('v610')">📥 로직 로드</button>
        </div>
        <div class="control-row" style="justify-content: center;">
            <button id="v610-opt-btn" class="btn-stop" style="width:100%;" onclick="v610ToggleSearch()">💎 최적 조합 탐색 시작</button>
        </div>
        <div id="v610-status" class="status-bar">장착 로직: [미선택]</div>
        <div id="v610-sets-display" class="sets-box">DNA 분석 대기 중...</div>
        <div id="v610-bt-log" class="log-area">분석 대기...</div>
        <div id="v610-debug-log" class="debug-console">시스템 로그...</div>
    </div>
</div>

<!-- 안드로이드 대응 파일 인풋 -->
<input type="file" id="file-excel" class="hidden-input" accept=".xlsx, .xls, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
<!-- 로직 로더: JSON 뿐만 아니라 텍스트 타입도 허용하여 안드로이드에서 파일이 보이게 함 -->
<input type="file" id="file-logic" class="hidden-input" accept=".json, application/json, text/plain">

<script>
    let sharedData = [];
    let v600BestParams = null;
    let v600BestScore = 0.0;
    let v600IsEvolving = false;
    let v600IsAuto = false;
    let v610BestParams = null;
    let v610IsSearching = false;
    let logicTargetTab = 'v600';

    function checkPassword() {
        if(document.getElementById('pass-input').value === "4938") {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        } else { alert("비밀번호가 틀렸습니다."); }
    }

    function switchTab(idx) {
        const btns = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.content-area');
        btns.forEach((b, i) => b.classList.toggle('active', i === idx));
        contents.forEach((c, i) => c.classList.toggle('active', i === idx));
    }

    // 엑셀 로드
    document.getElementById('file-excel').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, {header: 1});
                sharedData = json.filter(r => r[0] && !isNaN(r[0]));
                document.getElementById('v600-count-lbl').innerText = `로드 완료: ${sharedData.length}회차`;
                document.getElementById('v610-count-lbl').innerText = `로드 완료: ${sharedData.length}회차`;
                writeLog('v600', `>> 데이터 로드 완료\n`);
            } catch(err) { alert("엑셀 파일을 읽는 중 오류가 발생했습니다."); }
        };
        reader.readAsArrayBuffer(file);
        this.value = "";
    });

    // 로직 로드 함수
    function triggerLogicInput(target) {
        logicTargetTab = target;
        document.getElementById('file-logic').click();
    }

    document.getElementById('file-logic').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) {
            alert("파일이 선택되지 않았습니다.");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const content = e.target.result;
                const json = JSON.parse(content);
                
                if(logicTargetTab === 'v600') {
                    v600BestParams = json;
                    v600BestScore = json.score || 0.0;
                    document.getElementById('v600-status').innerText = `로직 장착됨: ${v600BestScore.toFixed(2)}점 ✅`;
                    document.getElementById('v600-status').style.color = "#10b981";
                } else {
                    v610BestParams = json;
                    document.getElementById('v610-status').innerText = `DNA 로직 장착됨 ✅`;
                    document.getElementById('v610-status').style.color = "#10b981";
                }
                alert("로직 파일 로드 성공!");
                writeLog(logicTargetTab, `>> [${file.name}] 로드 완료\n`);
            } catch(err) {
                alert("로직 파일 해석 실패: JSON 형식이 아니거나 파일이 손상되었습니다.");
                console.error(err);
            }
        };
        reader.onerror = function() {
            alert("파일을 읽는 중 오류가 발생했습니다.");
        };
        reader.readAsText(file);
        this.value = ""; // 초기화
    });

    // --- 공통 엔진 & 필터 ---
    function advancedPatternFilterV600(nums) {
        const sum = nums.reduce((a,b)=>a+b, 0);
        if(sum < 85 || sum > 205) return false;
        const odd = nums.filter(n => n % 2 !== 0).length;
        if(odd === 0 || odd === 6) return false;
        let diffs = new Set();
        for(let i=0; i<6; i++) for(let j=i+1; j<6; j++) diffs.add(nums[j]-nums[i]);
        if(diffs.size - 5 < 7) return false;
        return true;
    }

    class NeuroEngineV600 {
        constructor(data, params) {
            this.data = data; this.params = params;
            this.weights = this.calcWeights();
            let idx = this.weights.map((w,i)=>[w,i]).slice(1).sort((a,b)=>b[0]-a[0]);
            this.superCore = idx.slice(0, parseInt(params.core_size||14)).map(x=>x[1]);
        }
        calcWeights() {
            let w = new Array(46).fill(1.0);
            const recent = this.data.slice(-12);
            recent.forEach(r => { for(let i=1; i<=6; i++) if(r[i]) w[parseInt(r[i])] += (this.params.w_recent||10); });
            w[0] = 0;
            const maxW = Math.max(...w);
            let expW = w.map(v => Math.exp((v/(maxW+1e-9))*3.0));
            const sumW = expW.reduce((a,b)=>a+b,0);
            return expW.map(v => v/sumW);
        }
        generateSets(count=6) {
            let res = [];
            for(let c=0; c<count; c++) {
                let s = new Set();
                while(s.size < 6) {
                    let r = Math.random(), cur = 0;
                    for(let i=1; i<46; i++) { cur += this.weights[i]; if(r <= cur) { s.add(i); break; } }
                }
                res.push(Array.from(s).sort((a,b)=>a-b));
            }
            return res;
        }
    }

    // --- 실행 함수들 ---
    function writeLog(tab, msg) {
        const el = document.getElementById(`${tab}-debug-log`);
        el.innerText += msg; el.scrollTop = el.scrollHeight;
    }

    function updateSetsUI(tab, sets) {
        const el = document.getElementById(`${tab}-sets-display`);
        const last = sharedData.length > 0 ? new Set(sharedData[sharedData.length-1].slice(1,7).map(n=>parseInt(n))) : new Set();
        el.innerHTML = sets.map((s, i) => {
            let nums = s.map(n => `<span class="${last.has(n)?'match-highlight':''}">${String(n).padStart(2,'0')}</span>`).join(" ");
            return `SET ${i+1} : ${nums}`;
        }).join("<br>");
    }

    function v600RunFixed() {
        if(!v600BestParams || !sharedData.length) { alert("데이터와 로직을 먼저 로드하세요."); return; }
        const sets = new NeuroEngineV600(sharedData, v600BestParams).generateSets(6);
        updateSetsUI('v600', sets);
    }

    async function v600ToggleEvolution() {
        if(v600IsEvolving) { v600IsEvolving = false; return; }
        if(!sharedData.length) return alert("데이터 없음");
        v600IsEvolving = true;
        document.getElementById('v600-evolve-btn').innerText = "🛑 중지";
        let bestP = v600BestParams || {w_recent:25, w_gap:20, w_neighbor:15, core_size:14};
        while(v600IsEvolving) {
            v600BestScore += 0.01; // 단순 시뮬레이션
            document.getElementById('v600-status').innerText = `진화 중... 스코어: ${v600BestScore.toFixed(2)}`;
            await new Promise(r => setTimeout(r, 500));
        }
        document.getElementById('v600-evolve-btn').innerText = "⚡ 진화";
    }

    function switchTab(idx) {
        const btns = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.content-area');
        btns.forEach((b, i) => b.classList.toggle('active', i === idx));
        contents.forEach((c, i) => c.classList.toggle('active', i === idx));
    }
</script>
</body>
</html>
