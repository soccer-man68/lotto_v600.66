<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOTTO NEURO-DNA HYBRID v600 / v610 PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-dark: #020617; --panel-dark: #0f172a; --header-dark: #1e1b4b;
            --accent-blue: #38bdf8; --accent-green: #10b981; --accent-red: #f43f5e;
            --text-slate: #94a3b8;
        }
        body, html {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: white;
            font-family: 'Malgun Gothic', sans-serif; height: 100%; overflow-x: hidden;
        }
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: var(--panel-dark); padding: 30px; border-radius: 15px;
            border: 1px solid var(--header-dark); text-align: center; width: 85%; max-width: 320px;
        }
        input[type="password"] {
            padding: 12px; border-radius: 5px; border: none; width: 90%;
            font-size: 18px; text-align: center; margin-bottom: 20px; background: #1e293b; color: white;
        }
        #main-app { display: none; flex-direction: column; min-height: 100vh; }
        .tab-container { display: flex; background: var(--header-dark); position: sticky; top: 0; z-index: 100; }
        .tab-btn {
            flex: 1; padding: 15px 5px; cursor: pointer; border: none; background: none;
            color: var(--text-slate); font-weight: bold; font-size: 14px;
        }
        .tab-btn.active { background: var(--accent-blue); color: var(--bg-dark); }
        .content-area { flex: 1; padding: 15px; display: none; }
        .content-area.active { display: block; }
        header { background: var(--header-dark); padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 15px; }
        h1 { color: var(--accent-blue); font-size: 20px; margin: 0; font-family: 'Arial Black'; }
        .control-row {
            display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px;
            background: var(--panel-dark); padding: 12px; border-radius: 8px; border: 1px solid #334155;
        }
        .status-bar { color: var(--accent-red); font-weight: bold; margin: 10px 0; font-size: 14px; min-height: 20px; }
        .sets-box {
            background: #000; padding: 15px; font-family: 'Consolas', monospace; font-size: 19px;
            color: var(--text-slate); border-radius: 8px; line-height: 1.8; border: 1px solid #1e293b; margin-bottom: 15px;
        }
        .rank-panel { background: var(--panel-dark); border: 2px solid var(--accent-blue); border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .log-area { height: 160px; background: var(--panel-dark); color: var(--text-slate); font-family: 'Consolas', monospace; font-size: 12px; padding: 10px; overflow-y: auto; border: 1px solid #334155; border-radius: 5px; white-space: pre; margin-bottom: 15px; }
        .debug-console { height: 110px; background: #000; color: #34d399; font-family: 'Consolas', monospace; padding: 10px; overflow-y: auto; border-radius: 5px; font-size: 11px; }
        button { padding: 10px 12px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; color: white; font-size: 13px; }
        .btn-load { background: #475569; } .btn-evolve { background: #059669; } .btn-extract { background: #4338ca; } .btn-auto { background: #7c3aed; } .btn-stop { background: #dc2626; }
        .match-highlight { color: #facc15; font-weight: bold; text-decoration: underline; }
        .hit-red { color: var(--accent-red); font-weight: bold; }
        select { background: #1e293b; color: white; border: 1px solid #475569; padding: 8px; border-radius: 5px; }
        .hidden-input { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--accent-blue); margin-bottom: 20px;">SYSTEM ACCESS</h2>
        <input type="password" id="pass-input" placeholder="PASSWORD" inputmode="numeric">
        <button class="btn-load" style="background: var(--accent-blue); color:black; width:100%" onclick="checkPassword()">UNSEAL ACCESS</button>
    </div>
</div>

<div id="main-app">
    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab(0)">v600.66 Turbo</button>
        <button class="tab-btn" onclick="switchTab(1)">v610.00 DNA PRO</button>
    </div>

    <!-- v600.66 -->
    <div id="tab-v600" class="content-area active">
        <header><h1>NEURO-EVOLUTION v600.66</h1></header>
        <div class="control-row">
            <button class="btn-load" onclick="document.getElementById('file-excel').click()">📁 데이터 로드</button>
            <span id="v600-count-lbl">상태: 데이터 없음</span>
            <div style="flex:1"></div>
            <button class="btn-load" onclick="triggerLogicInput('v600')">📥 로직 로드</button>
        </div>
        <div class="control-row">
            <label>목표:</label>
            <select id="v600-target-score">
                <option value="3.5">3.5</option><option value="4.0" selected>4.0</option><option value="4.5">4.5</option>
            </select>
            <button id="v600-evolve-btn" class="btn-evolve" onclick="v600ToggleEvolution()">⚡ 진화 시작</button>
            <button class="btn-extract" onclick="v600RunFixed()">🎯 추출</button>
            <button id="v600-auto-btn" class="btn-auto" onclick="v600ToggleAuto()">🔄 자동</button>
        </div>
        <div id="v600-status" class="status-bar">로직 파일을 선택하거나 진화를 시작하세요.</div>
        <div id="v600-sets-display" class="sets-box">전용 엔진 대기 중...</div>
        <div id="v600-rank-panel" class="rank-panel" style="display:none;">
            <div id="v600-rank-text" style="font-weight:bold; color:var(--accent-blue); font-size:16px;"></div>
            <div id="v600-timer-text" style="color:var(--accent-green); font-size:12px; margin-top:5px;"></div>
        </div>
        <div id="v600-bt-log" class="log-area">적중 분석 로그 대기...</div>
        <div id="v600-debug-log" class="debug-console">시스템 로그...</div>
    </div>

    <!-- v610.00 -->
    <div id="tab-v610" class="content-area">
        <header><h1>DNA-EVOLUTION v610.00 PRO</h1></header>
        <div class="control-row">
            <button class="btn-load" onclick="document.getElementById('file-excel').click()">📁 데이터 로드</button>
            <span id="v610-count-lbl">상태: 데이터 없음</span>
            <div style="flex:1"></div>
            <button class="btn-load" onclick="triggerLogicInput('v610')">📥 로직 로드</button>
        </div>
        <div class="control-row"><button id="v610-opt-btn" class="btn-stop" style="width:100%; background:#e11d48;" onclick="v610ToggleSearch()">💎 최적 조합 탐색 시작</button></div>
        <div id="v610-status" class="status-bar">장착 로직: [미선택]</div>
        <div id="v610-sets-display" class="sets-box">DNA 분석 대기 중...</div>
        <div id="v610-rank-panel" class="rank-panel"><div id="v610-rank-text">Target: 3.10 Over</div></div>
        <div id="v610-bt-log" class="log-area">분석 대기...</div>
        <div id="v610-debug-log" class="debug-console">시스템 로그...</div>
    </div>
</div>

<input type="file" id="file-excel" class="hidden-input" accept=".xlsx, .xls, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
<input type="file" id="file-logic" class="hidden-input" accept=".json, application/json, text/plain, *">

<script>
    let sharedData = [];
    let v600BestParams = null, v600BestScore = 0.0, v600IsEvolving = false, v600IsAuto = false, v600IsWaiting = false;
    let v610BestParams = null, v610IsSearching = false;
    let logicTargetTab = 'v600';

    function checkPassword() {
        if(document.getElementById('pass-input').value === "4938") {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        } else alert("WRONG PASSWORD");
    }

    function switchTab(idx) {
        const btns = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.content-area');
        btns.forEach((b, i) => b.classList.toggle('active', i === idx));
        contents.forEach((c, i) => c.classList.toggle('active', i === idx));
    }

    // 안드로이드 파일 로드 대응 (Excel)
    document.getElementById('file-excel').addEventListener('change', function(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, {header: 1});
                sharedData = json.filter(r => r[0] && !isNaN(r[0]) && r[1]);
                const msg = `로드 완료: ${sharedData.length}회차`;
                document.getElementById('v600-count-lbl').innerText = msg;
                document.getElementById('v610-count-lbl').innerText = msg;
                writeLog('v600', `>> 데이터 로드 성공\n`);
            } catch(err) { alert("엑셀 로드 실패"); }
        };
        reader.readAsArrayBuffer(file); this.value = "";
    });

    // 안드로이드 파일 로드 대응 (Logic JSON)
    function triggerLogicInput(target) { logicTargetTab = target; document.getElementById('file-logic').click(); }
    document.getElementById('file-logic').addEventListener('change', function(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                if(logicTargetTab === 'v600') {
                    v600BestParams = json; v600BestScore = json.score || 0.0;
                    document.getElementById('v600-status').innerText = `로직 장착: [${v600BestScore.toFixed(2)}점] ✅`;
                } else {
                    v610BestParams = json;
                    document.getElementById('v610-status').innerText = `DNA 로직 장착: [${(json.score||0).toFixed(2)}점] ✅`;
                }
                alert("로직 로드 완료!");
            } catch(err) { alert("JSON 형식 오류"); }
        };
        reader.readAsText(file); this.value = "";
    });

    // --- [로직 엔진: Python 코드 100% 이식] ---

    function advancedPatternFilterV600(nums) {
        nums.sort((a,b)=>a-b);
        const sum = nums.reduce((a,b)=>a+b, 0);
        if(sum < 85 || sum > 205) return false;
        const odd = nums.filter(n => n % 2 !== 0).length;
        if(odd === 0 || odd === 6) return false;
        let diffs = new Set();
        for(let i=0; i<6; i++) for(let j=i+1; j<6; j++) diffs.add(nums[j]-nums[i]);
        if(diffs.size - 5 < 7) return false; // AC value < 7
        for(let i=0; i<4; i++) if(nums[i]+1===nums[i+1] && nums[i+1]+1===nums[i+2]) return false; // 3-연번 제거
        return true;
    }

    function dnaPatternFilterV610(nums) {
        nums.sort((a,b)=>a-b);
        const sum = nums.reduce((a,b)=>a+b, 0);
        if(sum < 110 || sum > 185) return false;
        const odd = nums.filter(n => n % 2 !== 0).length;
        if(![2,3,4].includes(odd)) return false;
        let diffs = new Set();
        for(let i=0; i<6; i++) for(let j=i+1; j<6; j++) diffs.add(nums[j]-nums[i]);
        if(diffs.size - 5 < 8) return false;
        const zones = nums.map(n => Math.floor(n/10));
        let counts = {}; zones.forEach(z => counts[z] = (counts[z]||0)+1);
        if(Object.values(counts).some(c => c >= 4)) return false;
        return true;
    }

    class NeuroEngineV600 {
        constructor(data, params) {
            this.data = data; this.params = params;
            this.weights = this.calcWeights();
            let idx = this.weights.map((w,i)=>[w,i]).slice(1).sort((a,b)=>b[0]-a[0]);
            this.superCore = idx.slice(0, parseInt(params.core_size||14)).map(x=>x[1]);
        }
        calcWeights() {
            let w = new Array(46).fill(1.0);
            const recent = this.data.slice(-12);
            recent.forEach(r => { for(let i=1; i<=6; i++) if(r[i]) w[parseInt(r[i])] += (this.params.w_recent||10); });
            let lastIdx = {};
            for(let i=0; i<this.data.length; i++) {
                let r = this.data[this.data.length-1-i];
                for(let j=1; j<=6; j++) {
                    let n = parseInt(r[j]); if(n && lastIdx[n]===undefined) lastIdx[n] = i;
                }
            }
            for(let n=1; n<=45; n++) {
                let gap = lastIdx[n]===undefined ? 100 : lastIdx[n];
                if(gap >= 6 && gap <= 15) w[n] += (this.params.w_gap||10);
                if(gap > 22) w[n] += (this.params.w_gap||10)*0.4;
            }
            const last = this.data[this.data.length-1];
            for(let i=1; i<=6; i++) {
                let n = parseInt(last[i]);
                if(n-1>=1) w[n-1] += (this.params.w_neighbor||10);
                if(n+1<=45) w[n+1] += (this.params.w_neighbor||10);
            }
            w[0] = 0; let maxW = Math.max(...w);
            let expW = w.map(v => Math.exp((v/(maxW+1e-9))*3.0));
            let sumW = expW.reduce((a,b)=>a+b,0);
            return expW.map(v => v/sumW);
        }
        generateSets(count=6) {
            let res = [];
            for(let c=0; c<count; c++) {
                let combo;
                for(let a=0; a<600; a++) {
                    let s = new Set();
                    let pick = Math.min(this.superCore.length, 3+Math.floor(Math.random()*2));
                    [...this.superCore].sort(()=>Math.random()-0.5).slice(0,pick).forEach(v=>s.add(v));
                    while(s.size < 6) {
                        let r = Math.random(), cur = 0;
                        for(let i=1; i<46; i++) { cur += this.weights[i]; if(r <= cur) { s.add(i); break; } }
                    }
                    combo = Array.from(s).sort((a,b)=>a-b);
                    if(advancedPatternFilterV600(combo)) break;
                }
                res.push(combo);
            }
            return res;
        }
    }

    class DNAEngineV605 {
        constructor(data, params) {
            this.data = data; this.params = params;
            this.weights = this.calcWeights();
            let idx = this.weights.map((w,i)=>[w,i]).slice(1).sort((a,b)=>b[0]-a[0]);
            this.dnaCore = idx.slice(0,10).map(x=>x[1]);
            this.linkPool = idx.slice(10,20).map(x=>x[1]);
        }
        calcWeights() {
            let w = new Array(46).fill(1.0);
            this.data.slice(-12).forEach(r => { for(let i=1; i<=6; i++) if(r[i]) w[parseInt(r[i])] += (this.params.w_recent||10); });
            w[0] = 0; let maxW = Math.max(...w);
            let powW = w.map(v => Math.pow(v/(maxW+1e-9), 15.0));
            let sumW = powW.reduce((a,b)=>a+b,0);
            return powW.map(v => v/sumW);
        }
        generateDnaSets(count=6) {
            let res = [];
            for(let c=0; c<count; c++) {
                let combo;
                for(let a=0; a<5000; a++) {
                    let c1cnt = 4+Math.floor(Math.random()*2);
                    let c1 = [...this.dnaCore].sort(()=>Math.random()-0.5).slice(0, c1cnt);
                    let c2 = [...this.linkPool].sort(()=>Math.random()-0.5).slice(0, 6-c1cnt);
                    combo = [...c1, ...c2].sort((a,b)=>a-b);
                    if(dnaPatternFilterV610(combo)) break;
                }
                res.push(combo || [...this.dnaCore].slice(0,6));
            }
            return res;
        }
    }

    // --- [UI & 제어 로직] ---
    function writeLog(tab, msg) { const el = document.getElementById(`${tab}-debug-log`); el.innerText += msg; el.scrollTop = el.scrollHeight; }
    
    function updateSetsUI(tab, sets) {
        const el = document.getElementById(`${tab}-sets-display`);
        const last = new Set(sharedData[sharedData.length-1].slice(1,7).map(n=>parseInt(n)));
        el.innerHTML = sets.map((s, i) => {
            let nums = s.map(n => `<span class="${last.has(n)?'match-highlight':''}">${String(n).padStart(2,'0')}</span>`).join(" ");
            return `SET ${i+1} : ${nums}`;
        }).join("<br>");
    }

    function backtest(tab, sets) {
        if(sharedData.length < 10) return [];
        const log = document.getElementById(`${tab}-bt-log`);
        let html = "회차 | 실제 당첨 번호 | 적중<br>" + "-".repeat(40) + "<br>";
        let history = [];
        for(let i=0; i<5; i++) {
            const row = sharedData[sharedData.length-1-i];
            const act = new Set(row.slice(1,7).map(n=>parseInt(n)));
            let hits = sets.map(s => s.filter(n => act.has(n)).length);
            let maxH = Math.max(...hits); history.push(maxH);
            html += `${row[0]} | ${Array.from(act).sort((a,b)=>a-b).map(n=>String(n).padStart(2,'0')).join(" ")} | ${hits.map(h=>`<span class="${h>=3?'hit-red':''}">[${h}]</span>`).join("")}<br>`;
        }
        log.innerHTML = html; return history;
    }

    async function v600ToggleEvolution() {
        if(v600IsEvolving) { v600IsEvolving = false; return; }
        if(!sharedData.length) return alert("데이터 로드 필요");
        v600IsEvolving = true;
        const btn = document.getElementById('v600-evolve-btn'); btn.innerText = "🛑 중단(저장)"; btn.className = "btn-stop";
        const target = parseFloat(document.getElementById('v600-target-score').value);
        let bestP = v600BestParams || {w_recent:25, w_gap:20, w_neighbor:15, core_size:14};
        let gen = 0;
        while(v600IsEvolving) {
            gen++; let currP = {...bestP};
            ['w_recent','w_gap','w_neighbor'].forEach(k => currP[k] = Math.max(1, currP[k] + (Math.random()*2-1)*0.5));
            
            // 점수 계산 루틴
            const eng1 = new NeuroEngineV600(sharedData.slice(0,-5), currP);
            const h1 = [0,1,2,3,4].map(i => Math.max(...eng1.generateSets(6).map(s=>s.filter(n=>new Set(sharedData[sharedData.length-5+i].slice(1,7).map(x=>parseInt(x))).has(n)).length)));
            const score = (h1.reduce((a,b)=>a+b,0)/5) + (h1.filter(x=>x>=3).length*0.2);

            if(score >= v600BestScore) {
                v600BestScore = score; v600BestParams = {...currP, score: score};
                document.getElementById('v600-status').innerText = `최고 점수 경신: ${score.toFixed(2)}점 (Gen ${gen})`;
                updateSetsUI('v600', new NeuroEngineV600(sharedData, v600BestParams).generateSets(6));
                if(score >= target) { v600Save(); break; }
            }
            if(gen % 50 === 0) { writeLog('v600', `Gen ${gen}.. Score: ${v600BestScore.toFixed(2)}\n`); await new Promise(r=>setTimeout(r,1)); }
        }
        v600IsEvolving = false; btn.innerText = "⚡ 진화 시작"; btn.className = "btn-evolve";
    }

    function v600RunFixed() {
        if(!v600BestParams) return alert("로직 필요");
        const sets = new NeuroEngineV600(sharedData, v600BestParams).generateSets(6);
        updateSetsUI('v600', sets); backtest('v600', sets);
    }

    async function v600ToggleAuto() {
        v600IsAuto = !v600IsAuto; 
        document.getElementById('v600-auto-btn').innerText = v600IsAuto ? "🛑 중지" : "🔄 자동";
        while(v600IsAuto) {
            if(v600IsWaiting) { await new Promise(r=>setTimeout(r,1000)); continue; }
            const sets = new NeuroEngineV600(sharedData, v600BestParams).generateSets(6);
            const hist = backtest('v600', sets);
            const avg = hist.reduce((a,b)=>a+b,0)/5;
            if(avg >= 3.0) {
                document.getElementById('v600-rank-panel').style.display = "block";
                document.getElementById('v600-rank-text').innerText = `🏆 추천 조합 (평균 ${avg.toFixed(2)})`;
                updateSetsUI('v600', sets); v600IsWaiting = true;
                for(let i=10; i>0; i--) { if(!v600IsAuto) break; document.getElementById('v600-timer-text').innerText = `${i}초 후 재탐색...`; await new Promise(r=>setTimeout(r,1000)); }
                v600IsWaiting = false;
            } else await new Promise(r=>setTimeout(r,50));
        }
    }

    async function v610ToggleSearch() {
        if(v610IsSearching) { v610IsSearching = false; return; }
        if(!v610BestParams) return alert("DNA 로직 필요");
        v610IsSearching = true; document.getElementById('v610-opt-btn').innerText = "🛑 탐색 중지";
        while(v610IsSearching) {
            const eng = new DNAEngineV605(sharedData, v610BestParams);
            const sets = eng.generateDnaSets(6);
            const hist = backtest('v610', sets);
            const avg = hist.reduce((a,b)=>a+b,0)/5;
            document.getElementById('v610-rank-text').innerText = `탐색 중... 평균: ${avg.toFixed(2)}`;
            updateSetsUI('v610', sets);
            if(avg >= 3.10) { alert(`최적 DNA 발견! (평균 ${avg.toFixed(2)})`); break; }
            await new Promise(r=>setTimeout(r,50));
        }
        v610IsSearching = false; document.getElementById('v610-opt-btn').innerText = "💎 최적 조합 탐색 시작";
    }

    function v600Save() {
        const blob = new Blob([JSON.stringify(v600BestParams)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `logic_v600_${v600BestScore.toFixed(2)}.json`; a.click();
    }
</script>
</body>
</html>
